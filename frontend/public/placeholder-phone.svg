<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone body -->
  <rect width="200" height="400" rx="25" fill="url(#phoneGradient)" stroke="#dee2e6" stroke-width="2"/>

  <!-- Screen -->
  <rect x="15" y="60" width="170" height="300" rx="15" fill="#212529"/>

  <!-- Screen content placeholder -->
  <rect x="25" y="70" width="150" height="280" rx="10" fill="#343a40"/>

  <!-- Home button -->
  <circle cx="100" cy="380" r="12" fill="#6c757d" stroke="#adb5bd" stroke-width="1"/>

  <!-- Speaker -->
  <rect x="70" y="20" width="60" height="4" rx="2" fill="#495057"/>

  <!-- Front camera -->
  <circle cx="100" cy="35" r="3" fill="#495057"/>

  <!-- Side buttons -->
  <rect x="5" y="100" width="3" height="30" rx="1" fill="#6c757d"/>
  <rect x="5" y="140" width="3" height="20" rx="1" fill="#6c757d"/>
  <rect x="192" y="110" width="3" height="30" rx="1" fill="#6c757d"/>
</svg>